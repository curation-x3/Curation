name: Release
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            rust_targets: 'aarch64-apple-darwin'
          - platform: windows-latest
            args: '--target x86_64-pc-windows-msvc'
            rust_targets: 'x86_64-pc-windows-msvc'
          - platform: windows-latest
            args: '--target aarch64-pc-windows-msvc'
            rust_targets: 'aarch64-pc-windows-msvc'
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Sync node version and setup cache
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm install

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}
          VITE_AUTHING_APP_ID: ${{ vars.VITE_AUTHING_APP_ID }}
          VITE_AUTHING_DOMAIN: ${{ vars.VITE_AUTHING_DOMAIN }}
          VITE_AUTHING_REDIRECT_URI: ${{ vars.VITE_AUTHING_REDIRECT_URI }}
        with:
          args: ${{ matrix.args }}
          tagName: v__VERSION__
          releaseName: 'v__VERSION__'
          releaseBody: |
            ## Downloads

            | File | Platform |
            |------|----------|
            | `Curation_x.x.x_aarch64.dmg` | **macOS** — Apple Silicon (M1 / M2 / M3 / M4) |
            | `Curation_x.x.x_x64-setup.exe` | **Windows x64** — recommended installer |
            | `Curation_x.x.x_x64_en-US.msi` | **Windows x64** — MSI alternative |
            | `Curation_x.x.x_arm64-setup.exe` | **Windows ARM** — for ARM devices (Surface Pro X, etc.) |
            | `Curation_aarch64.app.tar.gz` `*.sig` `latest.json` | Auto-updater files — no need to download manually |

            > **Intel Mac not supported yet.** If you need Intel Mac support, please open an issue.

            ---

            ## macOS Installation

            macOS blocks apps without an Apple Developer certificate. After installing, run this once in Terminal to remove the restriction:

            1. Open the `.dmg` and drag **Curation.app** to the Applications folder
            2. Open **Terminal** and run:

            ```bash
            xattr -cr /Applications/Curation.app
            ```

            3. Open the app normally. You will not need to repeat this for future updates.

            ---

            ## Notes

            App connects to the cloud backend automatically. No local server setup needed.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false

  # Runs after all platform builds complete.
  # Downloads each platform's actual uploaded artifact, signs it, and generates latest.json.
  update-manifest:
    needs: release
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Generate and upload updater manifest
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          BASE_URL="https://github.com/aiyah-meloken/Curation/releases/download/${TAG}"

          # List all assets in the release
          ASSETS=$(gh release view "$TAG" --repo ${{ github.repository }} --json assets -q '[.assets[].name]')
          echo "Release assets: $ASSETS"

          PLATFORMS="{}"

          # --- macOS Apple Silicon ---
          MAC_FILE=$(echo "$ASSETS" | jq -r '.[] | select(test("_aarch64\\.app\\.tar\\.gz$"))' | head -1)
          if [ -n "$MAC_FILE" ]; then
            echo "Signing macOS artifact: $MAC_FILE"
            mkdir -p /tmp/mac
            gh release download "$TAG" --repo ${{ github.repository }} --pattern "$MAC_FILE" --dir /tmp/mac
            npx @tauri-apps/cli signer sign "/tmp/mac/$MAC_FILE" \
              --private-key "$TAURI_SIGNING_PRIVATE_KEY" \
              --password "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}"
            MAC_SIG=$(cat "/tmp/mac/${MAC_FILE}.sig")
            gh release upload "$TAG" "/tmp/mac/${MAC_FILE}.sig" --clobber
            PLATFORMS=$(echo "$PLATFORMS" | jq \
              --arg sig "$MAC_SIG" \
              --arg url "${BASE_URL}/${MAC_FILE}" \
              '. + {"darwin-aarch64": {"signature": $sig, "url": $url}}')
          else
            echo "No macOS aarch64 artifact found, skipping."
          fi

          # --- Windows x64 (NSIS installer) ---
          WIN_FILE=$(echo "$ASSETS" | jq -r '.[] | select(test("_x64-setup\\.exe$"))' | head -1)
          if [ -n "$WIN_FILE" ]; then
            echo "Signing Windows artifact: $WIN_FILE"
            mkdir -p /tmp/win
            gh release download "$TAG" --repo ${{ github.repository }} --pattern "$WIN_FILE" --dir /tmp/win
            npx @tauri-apps/cli signer sign "/tmp/win/$WIN_FILE" \
              --private-key "$TAURI_SIGNING_PRIVATE_KEY" \
              --password "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}"
            WIN_SIG=$(cat "/tmp/win/${WIN_FILE}.sig")
            gh release upload "$TAG" "/tmp/win/${WIN_FILE}.sig" --clobber
            PLATFORMS=$(echo "$PLATFORMS" | jq \
              --arg sig "$WIN_SIG" \
              --arg url "${BASE_URL}/${WIN_FILE}" \
              '. + {"windows-x86_64": {"signature": $sig, "url": $url}}')
          else
            echo "No Windows x64 artifact found, skipping."
          fi

          # --- Windows ARM64 (NSIS installer) ---
          WIN_ARM_FILE=$(echo "$ASSETS" | jq -r '.[] | select(test("_arm64-setup\\.exe$"))' | head -1)
          if [ -n "$WIN_ARM_FILE" ]; then
            echo "Signing Windows ARM64 artifact: $WIN_ARM_FILE"
            mkdir -p /tmp/win-arm
            gh release download "$TAG" --repo ${{ github.repository }} --pattern "$WIN_ARM_FILE" --dir /tmp/win-arm
            npx @tauri-apps/cli signer sign "/tmp/win-arm/$WIN_ARM_FILE" \
              --private-key "$TAURI_SIGNING_PRIVATE_KEY" \
              --password "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}"
            WIN_ARM_SIG=$(cat "/tmp/win-arm/${WIN_ARM_FILE}.sig")
            gh release upload "$TAG" "/tmp/win-arm/${WIN_ARM_FILE}.sig" --clobber
            PLATFORMS=$(echo "$PLATFORMS" | jq \
              --arg sig "$WIN_ARM_SIG" \
              --arg url "${BASE_URL}/${WIN_ARM_FILE}" \
              '. + {"windows-aarch64": {"signature": $sig, "url": $url}}')
          else
            echo "No Windows ARM64 artifact found, skipping."
          fi

          if [ "$PLATFORMS" = "{}" ]; then
            echo "ERROR: No updater artifacts found, aborting."
            exit 1
          fi

          # Generate and upload latest.json
          jq -n \
            --arg version "$VERSION" \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --argjson platforms "$PLATFORMS" \
            '{"version": $version, "notes": "", "pub_date": $pub_date, "platforms": $platforms}' \
            > latest.json

          echo "Generated latest.json:"
          cat latest.json

          gh release upload "$TAG" latest.json --clobber
